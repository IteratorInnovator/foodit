stages:
  - test
  - build

include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

variables:
  SECRET_DETECTION_ENABLED: "true"
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: foodit/location-service
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA
  IMAGE_URI: $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG
  LATEST_IMAGE_URI: $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:latest

test:
  stage: test
  image: python:3.11-slim
  cache:
    key: pip-cache
    paths:
      - .pip-cache/
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"
  script:
    - pip install -r requirements.txt
    - pip install pytest pytest-mock "httpx<0.28"
    - pytest tests/ -v

lint:
  stage: test
  image: python:3.11-slim
  cache:
    key: pip-cache
    paths:
      - .pip-cache/
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"
  script:
    - pip install ruff
    - ruff check .

sast:
  stage: test

secret_detection:
  stage: test

build_and_push:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - apk add --no-cache python3 py3-pip
    - pip install --break-system-packages awscli
    - aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"
  script:
    - docker build --pull -t "$IMAGE_URI" -t "$LATEST_IMAGE_URI" .
    - docker push "$IMAGE_URI"
    - docker push "$LATEST_IMAGE_URI"
  only:
    - main
